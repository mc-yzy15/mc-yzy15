<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="Yzy15, Python 开发者, 前端工程师, GitHub, 自动化脚本, Web 开发, 前端技术, 技术博客, 开源项目">
    <meta name="author" content="{{ site.author }}">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="https://github.com/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://github.com/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://github.com">
    <style>
        :root {
            --apple-gray-1: #f5f5f7;
            --apple-gray-2: #e8e8ed;
            --apple-gray-3: #d2d2d7;
            --apple-gray-4: #86868b;
            --apple-gray-5: #424245;
            --apple-gray-6: #1d1d1f;
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ED;
            --apple-dark-blue: #0553b8;
            --apple-white: #ffffff;
            --apple-background: #ffffff;
            --apple-text-primary: #1d1d1f;
            --apple-text-secondary: #86868b;
            --apple-text-tertiary: #6e6e73;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-size-large: 56px;
            --font-size-medium: 28px;
            --font-size-small: 17px;
            --font-size-xsmall: 12px;
            --spacing-unit: 8px;
            --border-radius: 18px;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-bounce: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--apple-background);
            color: var(--apple-text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, var(--apple-white) 0%, var(--apple-gray-1) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 113, 227, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(0, 113, 227, 0.02) 0%, transparent 50%);
            animation: gradientMove 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(2%, 2%) rotate(1deg);
            }
            50% {
                transform: translate(0, 4%) rotate(0deg);
            }
            75% {
                transform: translate(-2%, 2%) rotate(-1deg);
            }
        }

        .hero-content {
            max-width: 980px;
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.05;
            color: var(--apple-text-primary);
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hero-subtitle {
            font-size: clamp(19px, 2.5vw, 28px);
            font-weight: 400;
            color: var(--apple-text-secondary);
            letter-spacing: 0.02em;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.15s forwards;
        }

        .hero-description {
            font-size: var(--font-size-small);
            color: var(--apple-text-tertiary);
            max-width: 600px;
            margin: 0 auto 48px auto;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.3s forwards;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.45s forwards;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: var(--font-size-small);
            font-weight: 500;
            color: var(--apple-white);
            background-color: var(--apple-blue);
            border-radius: 980px;
            text-decoration: none;
            transition: var(--transition-bounce);
            min-width: 280px;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .nav-link:hover {
            background-color: var(--apple-blue-hover);
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 113, 227, 0.35),
                        0 0 0 1px rgba(0, 113, 227, 0.1);
        }

        .nav-link:hover::after {
            width: 300px;
            height: 300px;
        }

        .nav-link:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }

        .nav-link-secondary {
            background-color: transparent;
            color: var(--apple-blue);
            border: 1.5px solid var(--apple-blue);
        }

        .nav-link-secondary:hover {
            background-color: var(--apple-blue);
            color: var(--apple-white);
            border-color: transparent;
            box-shadow: 0 8px 30px rgba(0, 113, 227, 0.35);
        }

        .nav-link-icon {
            margin-right: 10px;
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .nav-link:hover .nav-link-icon {
            transform: scale(1.2) rotate(-5deg);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards, bounce 2s ease-in-out 1.5s infinite;
        }

        .scroll-indicator svg {
            width: 32px;
            height: 32px;
            fill: var(--apple-text-secondary);
        }

        .content-section {
            padding: 100px 20px;
            background-color: var(--apple-white);
            position: relative;
        }

        .content-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--apple-gray-2) 50%, transparent 100%);
        }

        .content-container {
            max-width: 980px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--apple-text-primary);
            margin-bottom: 12px;
        }

        .section-subtitle {
            font-size: var(--font-size-small);
            color: var(--apple-text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .markdown-content {
            font-size: var(--font-size-small);
            line-height: 1.8;
            color: var(--apple-text-tertiary);
        }

        .markdown-content h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 700;
            color: var(--apple-text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.01em;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .markdown-content h1.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .markdown-content h2 {
            font-size: clamp(22px, 3vw, 28px);
            font-weight: 600;
            color: var(--apple-text-primary);
            margin: 48px 0 16px 0;
            letter-spacing: -0.005em;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: relative;
            padding-left: 20px;
        }

        .markdown-content h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, var(--apple-blue), var(--apple-dark-blue));
            border-radius: 2px;
            transition: height 0.4s ease;
        }

        .markdown-content h2.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .markdown-content h2.visible::before {
            height: 100%;
        }

        .markdown-content h3 {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--apple-text-primary);
            margin: 32px 0 12px 0;
        }

        .markdown-content p {
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .markdown-content p.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .markdown-content ul, .markdown-content ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }

        .markdown-content li {
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .markdown-content li.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .markdown-content li::marker {
            color: var(--apple-blue);
        }

        .markdown-content a {
            color: var(--apple-blue);
            text-decoration: none;
            transition: var(--transition-smooth);
            position: relative;
        }

        .markdown-content a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--apple-blue);
            transition: width 0.3s ease;
        }

        .markdown-content a:hover::after {
            width: 100%;
        }

        .markdown-content code {
            background-color: var(--apple-gray-1);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            transition: var(--transition-smooth);
        }

        .markdown-content code:hover {
            background-color: var(--apple-gray-2);
        }

        .markdown-content pre {
            background-color: var(--apple-gray-1);
            padding: 24px;
            border-radius: 16px;
            overflow-x: auto;
            margin: 24px 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            transition: var(--transition-smooth);
        }

        .markdown-content pre:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--apple-blue);
            padding: 16px 24px;
            margin: 24px 0;
            background: linear-gradient(90deg, rgba(0, 113, 227, 0.03) 0%, transparent 100%);
            border-radius: 0 12px 12px 0;
            color: var(--apple-text-secondary);
            font-style: normal;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .markdown-content blockquote.visible {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            background-color: var(--apple-gray-1);
            padding: 60px 20px;
            text-align: center;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--apple-gray-3) 50%, transparent 100%);
        }

        .footer-content {
            max-width: 980px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 32px;
        }

        .footer-link {
            font-size: var(--font-size-xsmall);
            color: var(--apple-text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
            position: relative;
            padding: 4px 0;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background-color: var(--apple-text-primary);
            transition: width 0.3s ease, left 0.3s ease;
        }

        .footer-link:hover {
            color: var(--apple-text-primary);
        }

        .footer-link:hover::after {
            width: 100%;
            left: 0;
        }

        .footer-copyright {
            font-size: var(--font-size-xsmall);
            color: var(--apple-text-secondary);
            line-height: 1.8;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-12px);
            }
            60% {
                transform: translateX(-50%) translateY(-6px);
            }
        }

        @media (max-width: 734px) {
            .hero-section {
                padding: 60px 20px;
                min-height: auto;
            }

            .hero-title {
                font-size: 40px;
            }

            .hero-subtitle {
                font-size: 19px;
            }

            .nav-link {
                width: 100%;
                max-width: 320px;
            }

            .content-section {
                padding: 60px 20px;
            }

            .section-title {
                font-size: 32px;
            }

            .scroll-indicator {
                display: none;
            }

            .footer-links {
                gap: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--apple-gray-1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--apple-gray-3);
            border-radius: 5px;
            border: 2px solid var(--apple-gray-1);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--apple-gray-4);
        }

        ::selection {
            background-color: var(--apple-blue);
            color: var(--apple-white);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --apple-gray-1: #1d1d1f;
                --apple-gray-2: #2d2d30;
                --apple-gray-3: #424245;
                --apple-gray-4: #86868b;
                --apple-gray-5: #d2d2d7;
                --apple-gray-6: #f5f5f7;
                --apple-white: #000000;
                --apple-background: #000000;
                --apple-text-primary: #f5f5f7;
                --apple-text-secondary: #86868b;
                --apple-text-tertiary: #6e6e73;
            }
        }
    </style>
</head>

<body>
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">{{ site.title }}</h1>
            <p class="hero-subtitle">{{ site.description }}</p>
            <p class="hero-description">
                专注于 Python 开发与前端技术，致力于构建优雅、高效的数字体验。
            </p>
            <nav class="nav-links">
                <a href="https://blog.yzy15.dpdns.org" class="nav-link" target="_blank" rel="noopener noreferrer">
                    <span class="nav-link-icon">✍️</span>
                    我的博客
                </a>
                <a href="https://home159263.wordpress.com/" class="nav-link nav-link-secondary" target="_blank" rel="noopener noreferrer">
                    <span class="nav-link-icon">📝</span>
                    我的博客 (WordPress.com)(不经常更新)
                </a>
            </nav>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
            </svg>
        </div>
    </section>

    <section class="content-section">
        <div class="content-container">
            <div class="markdown-content">
                {{ content }}
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="{{ site.url }}" class="footer-link" target="_blank">网站地址</a>
                <a href="https://github.com/{{ site.github_username }}" class="footer-link" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="mailto:{{ site.email }}" class="footer-link">联系邮箱</a>
                <a href="{{ site.social.bilibili }}" class="footer-link" target="_blank" rel="noopener noreferrer">Bilibili</a>
                <a href="{{ site.social.telegram }}" class="footer-link" target="_blank" rel="noopener noreferrer">Telegram</a>
            </div>
            <p class="footer-copyright">
                © {{ site.time | date: "%Y" }} {{ site.author }}<br>
                Made with ❤️ and code
            </p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const contentObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        const delay = entry.target.dataset.delay || 0;
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, delay);
                    }
                });
            }, observerOptions);

            const animatedElements = document.querySelectorAll('.markdown-content h1, .markdown-content h2, .markdown-content p, .markdown-content li, .markdown-content blockquote');
            animatedElements.forEach((el, index) => {
                el.dataset.delay = index * 50;
                contentObserver.observe(el);
            });

            const heroContent = document.querySelector('.hero-content');
            let lastScrollY = window.scrollY;
            let ticking = false;

            function updateParallax() {
                const scrolled = window.pageYOffset;
                const heroHeight = document.querySelector('.hero-section').offsetHeight;

                if (scrolled < heroHeight) {
                    const parallaxValue = scrolled * 0.3;
                    heroContent.style.transform = `translateY(${parallaxValue}px)`;
                    heroContent.style.opacity = 1 - (scrolled / heroHeight) * 0.8;
                }
                ticking = false;
            }

            window.addEventListener('scroll', function() {
                lastScrollY = window.scrollY;
                if (!ticking) {
                    window.requestAnimationFrame(updateParallax);
                    ticking = true;
                }
            });

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>
