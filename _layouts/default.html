<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="Yzy15, Python 开发者, 前端工程师, GitHub, 自动化脚本, Web 开发, 前端技术, 技术博客, 开源项目">
    <meta name="author" content="{{ site.author }}">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="https://github.com/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://github.com/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://github.com">
    <style>
        :root {
            --apple-gray-1: #f5f5f7;
            --apple-gray-2: #e8e8ed;
            --apple-gray-3: #d2d2d7;
            --apple-gray-4: #86868b;
            --apple-gray-5: #424245;
            --apple-gray-6: #1d1d1f;
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ED;
            --apple-dark-blue: #0553b8;
            --apple-white: #ffffff;
            --apple-background: #ffffff;
            --apple-text-primary: #1d1d1f;
            --apple-text-secondary: #86868b;
            --apple-text-tertiary: #6e6e73;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-size-large: 56px;
            --font-size-medium: 28px;
            --font-size-small: 17px;
            --font-size-xsmall: 12px;
            --spacing-unit: 8px;
            --border-radius: 18px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--apple-background);
            color: var(--apple-text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, var(--apple-white) 0%, var(--apple-gray-1) 100%);
            position: relative;
        }

        .hero-content {
            max-width: 980px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.05;
            color: var(--apple-text-primary);
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: clamp(19px, 2.5vw, 28px);
            font-weight: 400;
            color: var(--apple-text-secondary);
            letter-spacing: 0.02em;
            margin-bottom: 32px;
        }

        .hero-description {
            font-size: var(--font-size-small);
            color: var(--apple-text-tertiary);
            max-width: 600px;
            margin: 0 auto 48px auto;
            line-height: 1.6;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: var(--font-size-small);
            font-weight: 500;
            color: var(--apple-white);
            background-color: var(--apple-blue);
            border-radius: 980px;
            text-decoration: none;
            transition: var(--transition-smooth);
            min-width: 280px;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .nav-link:hover {
            background-color: var(--apple-blue-hover);
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.3);
        }

        .nav-link:active {
            transform: scale(0.98);
        }

        .nav-link-secondary {
            background-color: transparent;
            color: var(--apple-blue);
            border: 1px solid var(--apple-blue);
        }

        .nav-link-secondary:hover {
            background-color: var(--apple-blue);
            color: var(--apple-white);
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.3);
        }

        .nav-link-icon {
            margin-right: 8px;
            font-size: 16px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            opacity: 0.5;
        }

        .scroll-indicator svg {
            width: 32px;
            height: 32px;
            fill: var(--apple-text-secondary);
        }

        .content-section {
            padding: 100px 20px;
            background-color: var(--apple-white);
        }

        .content-container {
            max-width: 980px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--apple-text-primary);
            margin-bottom: 12px;
        }

        .section-subtitle {
            font-size: var(--font-size-small);
            color: var(--apple-text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .markdown-content {
            font-size: var(--font-size-small);
            line-height: 1.7;
            color: var(--apple-text-tertiary);
        }

        .markdown-content h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 700;
            color: var(--apple-text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }

        .markdown-content h2 {
            font-size: clamp(22px, 3vw, 28px);
            font-weight: 600;
            color: var(--apple-text-primary);
            margin: 48px 0 16px 0;
            letter-spacing: -0.005em;
        }

        .markdown-content h3 {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--apple-text-primary);
            margin: 32px 0 12px 0;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content ul, .markdown-content ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content a {
            color: var(--apple-blue);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content code {
            background-color: var(--apple-gray-1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        }

        .markdown-content pre {
            background-color: var(--apple-gray-1);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 24px 0;
        }

        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--apple-gray-3);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--apple-text-secondary);
            font-style: italic;
        }

        footer {
            background-color: var(--apple-gray-1);
            padding: 60px 20px;
            text-align: center;
        }

        .footer-content {
            max-width: 980px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 24px;
        }

        .footer-link {
            font-size: var(--font-size-xsmall);
            color: var(--apple-text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .footer-link:hover {
            color: var(--apple-text-primary);
        }

        .footer-copyright {
            font-size: var(--font-size-xsmall);
            color: var(--apple-text-secondary);
            line-height: 1.6;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        @media (max-width: 734px) {
            .hero-section {
                padding: 60px 20px;
                min-height: auto;
            }

            .hero-title {
                font-size: 40px;
            }

            .hero-subtitle {
                font-size: 19px;
            }

            .nav-link {
                width: 100%;
                max-width: 320px;
            }

            .content-section {
                padding: 60px 20px;
            }

            .section-title {
                font-size: 32px;
            }

            .scroll-indicator {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--apple-gray-1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--apple-gray-3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--apple-gray-4);
        }

        ::selection {
            background-color: var(--apple-blue);
            color: var(--apple-white);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --apple-gray-1: #1d1d1f;
                --apple-gray-2: #2d2d30;
                --apple-gray-3: #424245;
                --apple-gray-4: #86868b;
                --apple-gray-5: #d2d2d7;
                --apple-gray-6: #f5f5f7;
                --apple-white: #000000;
                --apple-background: #000000;
                --apple-text-primary: #f5f5f7;
                --apple-text-secondary: #86868b;
                --apple-text-tertiary: #6e6e73;
            }
        }
    </style>
</head>

<body>
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">{{ site.title }}</h1>
            <p class="hero-subtitle">{{ site.description }}</p>
            <p class="hero-description">
                专注于 Python 开发与前端技术，致力于构建优雅、高效的数字体验。
            </p>
            <nav class="nav-links">
                <a href="https://blog.yzy15.dpdns.org" class="nav-link" target="_blank" rel="noopener noreferrer">
                    <span class="nav-link-icon">✍️</span>
                    我的博客
                </a>
                <a href="https://home159263.wordpress.com/" class="nav-link nav-link-secondary" target="_blank" rel="noopener noreferrer">
                    <span class="nav-link-icon">📝</span>
                    我的博客 (WordPress.com)(不经常更新)
                </a>
            </nav>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15l-5-5h10l-5 5z"/>
                <path d="M7 10l5 5 5-5z"/>
            </svg>
        </div>
    </section>

    <section class="content-section">
        <div class="content-container">
            <div class="markdown-content">
                {{ content }}
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="{{ site.url }}" class="footer-link" target="_blank">网站地址</a>
                <a href="https://github.com/{{ site.github_username }}" class="footer-link" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="mailto:{{ site.email }}" class="footer-link">联系邮箱</a>
                <a href="{{ site.social.bilibili }}" class="footer-link" target="_blank" rel="noopener noreferrer">Bilibili</a>
                <a href="{{ site.social.telegram }}" class="footer-link" target="_blank" rel="noopener noreferrer">Telegram</a>
            </div>
            <p class="footer-copyright">
                © {{ site.time | date: "%Y" }} {{ site.author }}<br>
                用 ❤️ 与代码构建
            </p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.content-section').forEach(section => {
                section.style.opacity = '0';
                section.style.transform = 'translateY(20px)';
                section.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                observer.observe(section);
            });
        });
    </script>
</body>

</html>
